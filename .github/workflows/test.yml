name: Tests
on: [push, pull_request]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install .
      - run: bash tests/certs/gen_test_certs.sh
      - run: MESSENGER_CERT_DIR=tests/certs pytest tests/unit/ -v
