<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>secure-messenger — live demo</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: #0d1117;
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  font-family: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace;
  padding: 24px;
}

.scene {
  width: 100%;
  max-width: 900px;
  background: #0d1117;
  border-radius: 14px;
  border: 1px solid #21262d;
  overflow: hidden;
  padding: 0 0 28px;
}

.top-bar {
  background: #161b22;
  border-bottom: 1px solid #21262d;
  padding: 10px 18px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.dot { width: 11px; height: 11px; border-radius: 50%; }
.dot-r { background: #ff5f57; }
.dot-y { background: #febc2e; }
.dot-g { background: #28c840; }
.top-title {
  font-size: 12px;
  color: #484f58;
  margin-left: 8px;
  letter-spacing: 0.03em;
}

.badge-row {
  display: flex;
  gap: 8px;
  justify-content: center;
  padding: 20px 20px 12px;
}
.badge {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  padding: 3px 12px;
  border-radius: 20px;
  border: 1px solid;
}
.badge-tls  { color: #58a6ff; border-color: #1f6feb; }
.badge-e2e  { color: #3fb950; border-color: #2ea043; }
.badge-zero { color: #d2a8ff; border-color: #8957e5; }

.label-row {
  display: flex;
  gap: 12px;
  padding: 4px 20px 12px;
}
.pane-label {
  flex: 1;
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.09em;
  text-transform: uppercase;
  color: #484f58;
  text-align: center;
}

.terminals {
  display: flex;
  gap: 12px;
  padding: 0 20px;
}
.term {
  flex: 1;
  background: #010409;
  border-radius: 8px;
  border: 1px solid #21262d;
  overflow: hidden;
  min-height: 340px;
}
.term-bar {
  background: #161b22;
  border-bottom: 1px solid #21262d;
  padding: 8px 12px;
  display: flex;
  align-items: center;
  gap: 6px;
}
.term-title { font-size: 11px; color: #484f58; margin-left: 6px; }
.term-body {
  padding: 14px 16px;
  font-size: 12.5px;
  line-height: 1.75;
  min-height: 300px;
}
.line { display: block; white-space: pre; }
.prompt { color: #3fb950; }
.cmd    { color: #e6edf3; }
.info   { color: #8b949e; }
.tls    { color: #58a6ff; }
.enc    { color: #3fb950; }
.msg-a  { color: #ffa657; }
.msg-b  { color: #d2a8ff; }
.cursor {
  display: inline-block;
  width: 7px; height: 13px;
  background: #3fb950;
  vertical-align: middle;
  margin-left: 1px;
  animation: blink 1s step-end infinite;
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

.ctrl {
  display: flex;
  gap: 8px;
  justify-content: center;
  padding: 18px 20px 0;
}
.ctrl button {
  background: #21262d;
  color: #e6edf3;
  border: 1px solid #30363d;
  border-radius: 6px;
  padding: 6px 18px;
  font-size: 12px;
  font-family: monospace;
  cursor: pointer;
  letter-spacing: 0.03em;
}
.ctrl button:hover { background: #30363d; }

@media (max-width: 600px) {
  .terminals { flex-direction: column; }
}
</style>
</head>
<body>

<div class="scene">
  <div class="top-bar">
    <span class="dot dot-r"></span>
    <span class="dot dot-y"></span>
    <span class="dot dot-g"></span>
    <span class="top-title">secure-messenger — cinematic demo</span>
  </div>

  <div class="badge-row">
    <span class="badge badge-tls">TLS 1.3</span>
    <span class="badge badge-e2e">AES-256-GCM</span>
    <span class="badge badge-zero">zero persistence</span>
  </div>

  <div class="label-row">
    <div class="pane-label">machine A — 192.168.1.5</div>
    <div class="pane-label">machine B — 192.168.1.10</div>
  </div>

  <div class="terminals">
    <div class="term">
      <div class="term-bar">
        <span class="dot dot-r"></span>
        <span class="dot dot-y"></span>
        <span class="dot dot-g"></span>
        <span class="term-title">bash — machine A</span>
      </div>
      <div class="term-body" id="bodyA"></div>
    </div>
    <div class="term">
      <div class="term-bar">
        <span class="dot dot-r"></span>
        <span class="dot dot-y"></span>
        <span class="dot dot-g"></span>
        <span class="term-title">bash — machine B</span>
      </div>
      <div class="term-body" id="bodyB"></div>
    </div>
  </div>

  <div class="ctrl">
    <button id="replayBtn">replay</button>
  </div>
</div>

<script>
const A = document.getElementById('bodyA');
const B = document.getElementById('bodyB');

function span(cls, text) {
  const s = document.createElement('span');
  s.className = 'line ' + cls;
  s.textContent = text;
  return s;
}

function appendA(cls, text) { A.appendChild(span(cls, text)); }
function appendB(cls, text) { B.appendChild(span(cls, text)); }
function wait(ms) { return new Promise(r => setTimeout(r, ms)); }

let cursorEl = null;
function addCursor(parent) {
  if (cursorEl) cursorEl.remove();
  cursorEl = document.createElement('span');
  cursorEl.className = 'cursor';
  parent.appendChild(cursorEl);
}

async function typeInto(el, text, cls, delay=38) {
  if (cursorEl) cursorEl.remove();
  const s = document.createElement('span');
  s.className = 'line ' + cls;
  el.appendChild(s);
  for (const ch of text) {
    s.textContent += ch;
    await wait(delay + Math.random()*20);
  }
  addCursor(el);
  return s;
}

async function run() {
  A.innerHTML = '';
  B.innerHTML = '';
  if (cursorEl) { cursorEl.remove(); cursorEl = null; }

  await wait(400);
  appendA('prompt', '(.venv) derock@arch ~/secure-messenger');
  await wait(200);
  await typeInto(A, '$ source .venv/bin/activate', 'cmd');
  await wait(500);

  appendB('prompt', '(.venv) derock@arch ~/secure-messenger');
  await wait(150);
  await typeInto(B, '$ source .venv/bin/activate', 'cmd');
  await wait(700);

  appendA('info', '');
  await typeInto(A, '$ MESSENGER_CERT_DIR=tests/certs \\', 'cmd', 32);
  await wait(120);
  await typeInto(A, '  chat 192.168.1.10 -lp 8443 -pp 8444', 'cmd', 32);
  await wait(900);
  appendA('tls', '[tls]  handshake complete — TLS 1.3, AES-256-GCM');
  appendA('enc',  '[ok]   listening on :8443');
  appendA('info', '[*]    waiting for peer...');
  await wait(1000);

  appendB('info', '');
  await typeInto(B, '$ MESSENGER_CERT_DIR=tests/certs \\', 'cmd', 32);
  await wait(120);
  await typeInto(B, '  chat 192.168.1.5 -lp 8444 -pp 8443', 'cmd', 32);
  await wait(900);
  appendB('tls', '[tls]  handshake complete — TLS 1.3, AES-256-GCM');
  appendB('enc',  '[ok]   connected to 192.168.1.5:8443');
  appendB('info', '[*]    session ready. type to chat.');
  await wait(600);
  appendA('enc',  '[ok]   peer connected. session ready.');
  await wait(1000);

  appendA('info', '');
  await typeInto(A, 'hey — you on the LAN?', 'msg-a', 45);
  await wait(400);
  appendA('msg-a', '');
  await wait(700);
  appendB('msg-a', '  [192.168.1.5]  hey — you on the LAN?');
  await wait(900);

  appendB('info', '');
  await typeInto(B, 'yeah. end-to-end encrypted too?', 'msg-b', 42);
  await wait(400);
  appendB('msg-b', '');
  await wait(700);
  appendA('msg-b', '  [192.168.1.10] yeah. end-to-end encrypted too?');
  await wait(800);

  appendA('info', '');
  await typeInto(A, 'double-layered. TLS + AES-256.', 'msg-a', 42);
  await wait(400);
  appendA('msg-a', '');
  await wait(700);
  appendB('msg-a', '  [192.168.1.5]  double-layered. TLS + AES-256.');
  await wait(900);

  appendB('info', '');
  await typeInto(B, 'nothing saved to disk?', 'msg-b', 45);
  await wait(400);
  appendB('msg-b', '');
  await wait(700);
  appendA('msg-b', '  [192.168.1.10] nothing saved to disk?');
  await wait(800);

  appendA('info', '');
  await typeInto(A, 'zero persistence. gone when you close.', 'msg-a', 40);
  await wait(400);
  appendA('msg-a', '');
  await wait(700);
  appendB('msg-a', '  [192.168.1.5]  zero persistence. gone when you close.');
  await wait(1200);

  appendB('info', '');
  await typeInto(B, '^C', 'info', 80);
  appendB('enc', '[bye]  session closed. no logs written.');
  await wait(600);
  appendA('enc', '[bye]  peer disconnected. session closed.');
  if (cursorEl) cursorEl.remove();
}

document.getElementById('replayBtn').addEventListener('click', run);
run();
</script>
</body>
</html>
